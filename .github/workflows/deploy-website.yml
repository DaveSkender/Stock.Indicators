name: Deploy website

on:
  workflow_dispatch:
  pull_request:
    paths:
      - docs/**

permissions:
  contents: read
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 24

jobs:
  deploy:
    name: Cloudflare Pages
    # Skip on fork PRs — Cloudflare deploy secrets aren't available there.
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: docs

    environment:
      name: stockindicators.dev
      url: ${{ steps.deploy.outputs.pages-deployment-alias-url }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # required for proper Last Updated page dates

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false
          package_json_file: docs/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: docs/pnpm-lock.yaml
          registry-url: "https://npm.pkg.github.com"
          scope: "@facioquo"

      - name: Install pnpm packages
        run: pnpm install --frozen-lockfile
        env:
          # GITHUB_TOKEN + packages: read permission is sufficient for public
          # cross-org packages per https://docs.github.com/en/packages/working-with-a-github-packages-registry/working-with-the-npm-registry
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Define tag
        id: tag
        run: echo "version=$(date +'%Y.%m.%d')-${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Build site (production)
        if: github.ref == 'refs/heads/main'
        run: pnpm run docs:build
        env:
          NODE_ENV: production
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build site (preview)
        if: github.ref != 'refs/heads/main'
        run: pnpm run docs:build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3.14.1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_KEY }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >
            pages deploy docs/.vitepress/dist
            --project-name=${{ vars.CLOUDFLARE_PROJECT_NAME }}
