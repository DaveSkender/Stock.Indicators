name: Website URLs

on:
  pull_request:
    branches: ["*"]
    paths:
      - docs/**
      - .github/workflows/test-website-links.yml
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 24

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ !github.event.pull_request.draft }}
    defaults:
      run:
        working-directory: docs

    steps:
      - name: Checkout source
        uses: actions/checkout@v7

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false
          package_json_file: docs/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: docs/pnpm-lock.yaml

      - name: Configure pnpm registry auth
        run: pnpm config set //npm.pkg.github.com/:_authToken ${{ secrets.GITHUB_TOKEN }}

      - name: Install pnpm packages
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm run docs:build

      - name: Install htmlproofer
        run: gem install html-proofer

      - name: Test for broken URLs
        run: >
          htmlproofer .vitepress/dist
          --no-enforce-https
          --no-check-external-hash
          --ignore-status-codes "302,402,403,406,408,415,429,502,503,999"
          --ignore-urls "/fonts.gstatic.com/,/github\.com\/DaveSkender\/Stock\.Indicators\/(blob|tree)\//"
