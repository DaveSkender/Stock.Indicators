name: Website a11y

on:
  pull_request:
    branches: ["*"]
    paths:
      - docs/**
      - .github/workflows/test-website-a11y.yml
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 24

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ !github.event.pull_request.draft }}
    defaults:
      run:
        working-directory: docs

    steps:
      - name: Checkout source
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false
          package_json_file: docs/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: docs/pnpm-lock.yaml

      - name: Configure pnpm registry auth
        run: pnpm config set //npm.pkg.github.com/:_authToken ${{ secrets.GITHUB_TOKEN }}

      - name: Install pnpm packages
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm run docs:build

      - name: Serve site
        run: pnpm run docs:preview &

      - name: Wait for server
        run: sleep 5

      - name: Show environment
        run: pnpm dlx pa11y --environment

      - name: Test accessibility
        run: >
          pnpm dlx pa11y-ci
          --sitemap http://localhost:4173/sitemap.xml

      - name: Kill site (failsafe)
        if: always()
        run: pkill -f vitepress
