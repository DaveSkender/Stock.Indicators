name: Test performance (comparison)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    # StyleComparison is [ShortRunJob] (already ShortRun, no --job flag needed),
    # but it covers ~86 indicators x 3 styles (incl. per-run hub builds), which
    # exceeds 90 min on a 2-core hosted runner. Raised to match
    # test-performance.yml. Committed baselines are generated locally on the
    # reference host (see tools/performance/baselines/README.md), not here.
    timeout-minutes: 360

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.x"
          dotnet-quality: "ga"
          cache: true
          cache-dependency-path: "**/packages.lock.json"

      - name: Install .NET tools
        run: dotnet tool restore

      - name: Determine version
        id: gitversion
        run: |
          dotnet tool run dotnet-gitversion -config src/gitversion.yml -updateassemblyinfo
          # Export GitVersion variables to environment
          dotnet tool run dotnet-gitversion -config src/gitversion.yml | jq -r 'to_entries[] | "\(.key)=\(.value)"' >> $GITHUB_ENV

      - name: Build performance project
        working-directory: tools/performance
        run: >
          dotnet build
          --configuration Release
          --property:ContinuousIntegrationBuild=true

      - name: Test performance (style comparison)
        working-directory: tools/performance
        run: |
          echo "Running style comparison benchmarks..."
          dotnet run -c Release -- --filter 'Performance.StyleComparison*'

      - name: Save test results
        uses: actions/upload-artifact@v6
        with:
          name: test-summaries
          path: tools/performance/BenchmarkDotNet.Artifacts/results

      - name: Publish summary
        working-directory: tools/performance/BenchmarkDotNet.Artifacts/results
        shell: bash
        env:
          VERSION: ${{ steps.gitversion.outputs.FullSemVer }}
        run: |
          TITLE="## Style comparison performance"
          if [ -n "$VERSION" ]; then
            TITLE="$TITLE for $VERSION"
          fi
          echo "$TITLE" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          REPORT_FILE="Performance.StyleComparison-report-github.md"
          if [ -f "$REPORT_FILE" ]; then
            cat "$REPORT_FILE" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No style comparison benchmark reports were generated." >> $GITHUB_STEP_SUMMARY
          fi
