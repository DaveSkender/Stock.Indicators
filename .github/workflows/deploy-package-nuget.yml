name: Deploy package (NuGet.org)

## Production Package Deployment
# Deploys packages to nuget.org when a GitHub Release is published.
# Version comes directly from the release tag (strips 'v' prefix).
#
# Trigger behavior:
#   - Release published: Full deployment to nuget.org
#   - Manual workflow_dispatch: Dry-run mode (build only, no deploy)
#
# Saving a draft GitHub Release does NOT trigger this workflow.
# To validate a build without publishing, run the workflow manually
# (Actions tab → "Run workflow") and supply the release tag.
#
# Version examples:
#   - Tag v2.8.0 → deploys 2.8.0 (stable)
#   - Tag v3.0.0-preview.2 → deploys 3.0.0-preview.2 (preview)
#   - Tag v2.8.0-alpha.1 → deploys 2.8.0-alpha.1 (pre-release)
#
# For CI builds to GitHub Packages, see the separate "CI Package Deploy" workflow.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to dry-run (e.g. v3.0.0). Build only, no deploy."
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.x"
          dotnet-quality: "ga"
          cache: true
          cache-dependency-path: "**/packages.lock.json"

      - name: Extract version from release tag
        id: version_info
        run: |
          # Tag source depends on trigger:
          #   - release published → release tag
          #   - workflow_dispatch  → manual tag input
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.event.release.tag_name }}"
          fi
          VERSION="${TAG#v}"  # strip 'v' prefix

          if [[ -z "$VERSION" ]]; then
            echo "::error::Could not extract version from tag: $TAG"
            exit 1
          fi

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Production version from tag: $VERSION"

      - name: Determine deployment mode
        id: settings
        run: |
          # Fail-safe: default to dry-run. Only a published GitHub Release
          # performs the irreversible deployment to nuget.org; every other
          # trigger (manual workflow_dispatch, etc.) builds without deploying.
          if [[ "${{ github.event_name }}" == "release" && "${{ github.event.action }}" == "published" ]]; then
            echo "dry_run=false" >> $GITHUB_OUTPUT
            echo "🚀 DEPLOY mode (published release)"
          else
            echo "dry_run=true" >> $GITHUB_OUTPUT
            echo "🔍 DRY RUN mode (default; not a published release)"
          fi

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils

      - name: Compose package info
        id: package_info
        run: |
          PACKAGE_NAME=$(xmllint --xpath "//PropertyGroup/PackageId/text()" src/Indicators.csproj 2>/dev/null)
          if [[ -z "$PACKAGE_NAME" ]]; then
            echo "::error::Could not extract PackageId from src/Indicators.csproj"
            exit 1
          fi
          echo "name=${PACKAGE_NAME}" >> $GITHUB_OUTPUT
          echo "url=https://www.nuget.org/packages/${PACKAGE_NAME}/${{ steps.version_info.outputs.version }}" >> $GITHUB_OUTPUT

      - name: Replace version markers
        uses: jacobtomlinson/gha-find-replace@v3
        with:
          find: "#{PACKAGE_VERSION}#"
          replace: "${{ steps.version_info.outputs.version }}"
          regex: false

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --no-restore --configuration Release

      - name: Create NuGet package
        run: |
          dotnet pack src/Indicators.csproj \
            --no-build \
            --configuration Release \
            --output NuGet \
            -p:PackageVersion=${{ steps.version_info.outputs.version }}

      - name: Upload package artifact
        uses: actions/upload-artifact@v6
        with:
          name: packages
          path: NuGet/*.nupkg
          if-no-files-found: error
          retention-days: 7

      - name: Summary output
        if: always()
        run: |
          MODE="🚀 PRODUCTION DEPLOY"
          if [[ "${{ steps.settings.outputs.dry_run }}" == "true" ]]; then
            MODE="🔍 DRY RUN (Manual Trigger)"
          fi

          {
            echo "| Component         | Value                                            |"
            echo "| ----------------- | ------------------------------------------------ |"
            echo "| **Mode**          | $MODE                                            |"
            echo "| Package Version   | ${{ steps.version_info.outputs.version }}        |"
            echo "| Release Tag       | ${{ steps.version_info.outputs.tag }}            |"
            echo "| Target            | nuget.org                                        |"
            echo "| Package URL       | ${{ steps.package_info.outputs.url }}            |"
          } >> $GITHUB_STEP_SUMMARY

    outputs:
      version: ${{ steps.version_info.outputs.version }}
      url: ${{ steps.package_info.outputs.url }}
      name: ${{ steps.package_info.outputs.name }}
      dry_run: ${{ steps.settings.outputs.dry_run }}

  deploy:
    needs: package
    runs-on: ubuntu-latest
    if: success()

    permissions:
      packages: write
      id-token: write # Required for OIDC authentication to nuget.org

    env:
      version: ${{ needs.package.outputs.version }}
      dry_run: ${{ needs.package.outputs.dry_run }}
      url: ${{ needs.package.outputs.url }}
      name: ${{ needs.package.outputs.name }}
      NUGET_PUBLISH_URL: https://api.nuget.org/v3/index.json

    environment:
      name: nuget.org
      url: ${{ needs.package.outputs.url }}

    steps:
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.x"
          dotnet-quality: "ga"

      - name: Download package
        uses: actions/download-artifact@v7
        with:
          name: packages
          path: NuGet

      - name: NuGet login (OIDC → temp API key)
        if: ${{ env.dry_run == 'false' }}
        uses: NuGet/login@v1
        id: nuget_login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish package to nuget.org
        if: ${{ env.dry_run == 'false' }}
        run: >
          dotnet nuget push NuGet/*.nupkg
          --source "${{ env.NUGET_PUBLISH_URL }}"
          --api-key "${{ steps.nuget_login.outputs.NUGET_API_KEY }}"

      - name: Production package published
        if: ${{ env.dry_run == 'false' }}
        run: |
          echo "📦 Published production package ${{ env.name }} version ${{ env.version }} to nuget.org"
          echo "   Release: ${{ github.event.release.html_url }}"

      - name: Deployment summary
        if: always()
        run: |
          {
            echo "| Version | ${{ env.version }} |"
          } >> $GITHUB_STEP_SUMMARY
